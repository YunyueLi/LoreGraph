services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: litgraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litgraph
      POSTGRES_PASSWORD: litgraph
      POSTGRES_DB: litgraph
    ports:
      - "5432:5432"
    volumes:
      - litgraph_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litgraph"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  litgraph_pgdata:
