name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: loregraph
          POSTGRES_PASSWORD: loregraph
          POSTGRES_DB: loregraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loregraph"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://loregraph:loregraph@localhost:5432/loregraph
      ANTHROPIC_API_KEY: sk-ant-ci-dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=loregraph psql -h localhost -U loregraph -d loregraph \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Unit tests
        run: pytest -m "unit"
      - name: Integration tests
        run: pytest -m "integration"
