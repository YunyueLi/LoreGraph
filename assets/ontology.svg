<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <radialGradient id="agent" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#bfdbfe"/>
    </radialGradient>
    <radialGradient id="object" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#a7f3d0"/>
    </radialGradient>
    <radialGradient id="event" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fde68a"/>
    </radialGradient>
    <radialGradient id="concept" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ddd6fe"/>
    </radialGradient>
  </defs>

  <rect width="1120" height="540" fill="url(#bg)"/>

  <!-- Title -->
  <text x="560" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">What's in the graph</text>
  <text x="560" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    4 entity types · 5 relation classes · 10-dim implicit (GLUCOSE) facts
  </text>

  <!-- Entity-type cards -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="240" height="160" rx="14" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
    <circle cx="80" cy="148" r="20" fill="url(#agent)" stroke="#3a6fa5" stroke-width="1.5"/>
    <text x="110" y="146" font-size="18" font-weight="700" fill="#0f172a">Agent</text>
    <text x="110" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#3a6fa5">主体</text>
    <line x1="60" y1="184" x2="260" y2="184" stroke="#e2e8f0"/>
    <text x="60" y="206" font-size="12" fill="#475569">individuals · groups acting</text>
    <text x="60" y="222" font-size="12" fill="#475569">as a unit · mythic figures</text>
    <text x="60" y="248" font-size="11" fill="#94a3b8" font-style="italic">
      examples: a protagonist,
    </text>
    <text x="60" y="262" font-size="11" fill="#94a3b8" font-style="italic">
      the family, the army
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="110" width="240" height="160" rx="14" fill="#ffffff" stroke="#a7f3d0" stroke-width="1"/>
    <circle cx="340" cy="148" r="20" fill="url(#object)" stroke="#0e7a7a" stroke-width="1.5"/>
    <text x="370" y="146" font-size="18" font-weight="700" fill="#0f172a">Object</text>
    <text x="370" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#0e7a7a">客体</text>
    <line x1="320" y1="184" x2="520" y2="184" stroke="#e2e8f0"/>
    <text x="320" y="206" font-size="12" fill="#475569">physical things · places</text>
    <text x="320" y="222" font-size="12" fill="#475569">documents · artifacts</text>
    <text x="320" y="248" font-size="11" fill="#94a3b8" font-style="italic">
      examples: a letter,
    </text>
    <text x="320" y="262" font-size="11" fill="#94a3b8" font-style="italic">
      the manor, a diary
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="110" width="240" height="160" rx="14" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
    <circle cx="600" cy="148" r="20" fill="url(#event)" stroke="#b17304" stroke-width="1.5"/>
    <text x="630" y="146" font-size="18" font-weight="700" fill="#0f172a">Event</text>
    <text x="630" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#b17304">事件</text>
    <line x1="580" y1="184" x2="780" y2="184" stroke="#e2e8f0"/>
    <text x="580" y="206" font-size="12" fill="#475569"><tspan font-style="italic">realis</tspan> triggers — actually</text>
    <text x="580" y="222" font-size="12" fill="#475569">happened in the story world</text>
    <text x="580" y="248" font-size="11" fill="#94a3b8" font-style="italic">
      excludes: hypothetical,
    </text>
    <text x="580" y="262" font-size="11" fill="#94a3b8" font-style="italic">
      generic, negated, imagined
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="110" width="240" height="160" rx="14" fill="#ffffff" stroke="#ddd6fe" stroke-width="1"/>
    <circle cx="860" cy="148" r="20" fill="url(#concept)" stroke="#6d4e94" stroke-width="1.5"/>
    <text x="890" y="146" font-size="18" font-weight="700" fill="#0f172a">Concept</text>
    <text x="890" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#6d4e94">概念</text>
    <line x1="840" y1="184" x2="1040" y2="184" stroke="#e2e8f0"/>
    <text x="840" y="206" font-size="12" fill="#475569">themes · named relationships</text>
    <text x="840" y="222" font-size="12" fill="#475569">predictions · motifs</text>
    <text x="840" y="248" font-size="11" fill="#94a3b8" font-style="italic">
      examples: the engagement,
    </text>
    <text x="840" y="262" font-size="11" fill="#94a3b8" font-style="italic">
      the curse, redemption
    </text>
  </g>

  <!-- Relations section -->
  <text x="40" y="318" font-size="14" font-weight="700" letter-spacing="1.5" fill="#475569">FIVE RELATION CLASSES</text>

  <g filter="url(#shadow)">
    <rect x="40" y="330" width="200" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="40" y="330" width="6" height="64" rx="3" fill="#3a6fa5"/>
    <text x="60" y="358" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#0f172a">STRUCTURAL</text>
    <text x="60" y="378" font-size="11" fill="#64748b">membership · location</text>
    <text x="60" y="390" font-size="11" fill="#64748b">ownership · part-of</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="252" y="330" width="200" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="252" y="330" width="6" height="64" rx="3" fill="#5b8dbf"/>
    <text x="272" y="358" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#0f172a">INTERACTS</text>
    <text x="272" y="378" font-size="11" fill="#64748b">direct action between</text>
    <text x="272" y="390" font-size="11" fill="#64748b">entities · event participation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="464" y="330" width="200" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="464" y="330" width="6" height="64" rx="3" fill="#0e7a7a"/>
    <text x="484" y="358" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#0f172a">ASSERTS</text>
    <text x="484" y="378" font-size="11" fill="#64748b">claims · beliefs · what</text>
    <text x="484" y="390" font-size="11" fill="#64748b">an entity says about another</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="330" width="200" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="676" y="330" width="6" height="64" rx="3" fill="#b17304"/>
    <text x="696" y="358" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#0f172a">INFLUENCES</text>
    <text x="696" y="378" font-size="11" fill="#64748b">causal effect</text>
    <text x="696" y="390" font-size="11" fill="#64748b">(four-tier evidence levels)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="888" y="330" width="172" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="888" y="330" width="6" height="64" rx="3" fill="#1e8848"/>
    <text x="908" y="358" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#0f172a">PREDICTS</text>
    <text x="908" y="378" font-size="11" fill="#64748b">prophecy · foreshadowing</text>
    <text x="908" y="390" font-size="11" fill="#64748b">forward-looking statement</text>
  </g>

  <!-- GLUCOSE strip -->
  <text x="40" y="436" font-size="14" font-weight="700" letter-spacing="1.5" fill="#475569">10-DIMENSIONAL IMPLICIT FACTS · GLUCOSE</text>
  <text x="40" y="456" font-size="11" fill="#94a3b8" font-style="italic">Mostafazadeh et al. EMNLP 2020 — Best Paper</text>

  <g filter="url(#shadow)" transform="translate(40, 470)">
    <rect x="0" y="0" width="1020" height="50" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#0f172a">5 dimensions</text>
    <text x="20" y="38" font-size="11" font-family="ui-monospace, monospace" fill="#475569">cause · emotion · location · possession · attribute</text>
    <text x="540" y="22" font-size="12" font-weight="700" fill="#0f172a">2 time aspects</text>
    <text x="540" y="38" font-size="11" font-family="ui-monospace, monospace" fill="#475569">before  ·  after</text>
    <text x="780" y="22" font-size="12" font-weight="700" fill="#0f172a">inference depth</text>
    <text x="780" y="38" font-size="11" font-family="ui-monospace, monospace" fill="#475569">explicit · one_step · multi_step</text>
  </g>
</svg>
