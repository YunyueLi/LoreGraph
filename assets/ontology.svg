<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <rect width="1120" height="540" fill="#f3ede0"/>

  <!-- Title -->
  <text x="560" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">What's in the graph</text>
  <text x="560" y="68" text-anchor="middle" font-size="13" fill="#666666" font-style="italic">
    4 entity types · 5 relation classes · 10-dim implicit (GLUCOSE) facts
  </text>

  <!-- ════════ Entity-type cards · shape encodes type ════════ -->

  <!-- Agent · circle -->
  <g>
    <rect x="40" y="110" width="240" height="160" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle cx="80" cy="148" r="18" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="112" y="146" font-size="18" font-weight="700" fill="#1a1a1a">Agent</text>
    <text x="112" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#8a6f37">主体 · circle</text>
    <line x1="60" y1="184" x2="260" y2="184" stroke="#e6dbc7"/>
    <text x="60" y="208" font-size="12" fill="#1a1a1a">individuals · groups acting</text>
    <text x="60" y="224" font-size="12" fill="#1a1a1a">as a unit · mythic figures</text>
    <text x="60" y="250" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      ex: a protagonist,
    </text>
    <text x="60" y="264" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      the family, the army
    </text>
  </g>

  <!-- Object · square -->
  <g>
    <rect x="300" y="110" width="240" height="160" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="322" y="132" width="36" height="36" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="372" y="146" font-size="18" font-weight="700" fill="#1a1a1a">Object</text>
    <text x="372" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#8a6f37">客体 · square</text>
    <line x1="320" y1="184" x2="520" y2="184" stroke="#e6dbc7"/>
    <text x="320" y="208" font-size="12" fill="#1a1a1a">physical things · places</text>
    <text x="320" y="224" font-size="12" fill="#1a1a1a">documents · artifacts</text>
    <text x="320" y="250" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      ex: a letter,
    </text>
    <text x="320" y="264" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      the manor, a diary
    </text>
  </g>

  <!-- Event · diamond -->
  <g>
    <rect x="560" y="110" width="240" height="160" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <g transform="rotate(45 600 150)"><rect x="580" y="130" width="40" height="40" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/></g>
    <text x="634" y="146" font-size="18" font-weight="700" fill="#1a1a1a">Event</text>
    <text x="634" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#8a6f37">事件 · diamond</text>
    <line x1="580" y1="184" x2="780" y2="184" stroke="#e6dbc7"/>
    <text x="580" y="208" font-size="12" fill="#1a1a1a"><tspan font-style="italic">realis</tspan> triggers — actually</text>
    <text x="580" y="224" font-size="12" fill="#1a1a1a">happened in the story world</text>
    <text x="580" y="250" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      excludes: hypothetical,
    </text>
    <text x="580" y="264" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      generic, negated, imagined
    </text>
  </g>

  <!-- Concept · hexagon -->
  <g>
    <rect x="820" y="110" width="240" height="160" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <polygon points="846,150 856,134 880,134 894,150 880,166 856,166" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="904" y="146" font-size="18" font-weight="700" fill="#1a1a1a">Concept</text>
    <text x="904" y="164" font-size="11" font-family="ui-monospace, monospace" fill="#8a6f37">概念 · hexagon</text>
    <line x1="840" y1="184" x2="1040" y2="184" stroke="#e6dbc7"/>
    <text x="840" y="208" font-size="12" fill="#1a1a1a">themes · named relationships</text>
    <text x="840" y="224" font-size="12" fill="#1a1a1a">predictions · motifs</text>
    <text x="840" y="250" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      ex: the engagement,
    </text>
    <text x="840" y="264" font-size="11" fill="#999999" font-style="italic" font-family="Georgia, serif">
      the curse, redemption
    </text>
  </g>

  <!-- ════════ Relation classes · style encodes type ════════ -->
  <text x="40" y="318" font-size="13" font-weight="700" letter-spacing="2" fill="#8a6f37">FIVE RELATION CLASSES</text>

  <g>
    <rect x="40"  y="330" width="200" height="64" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="58" y1="358" x2="92" y2="358" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="100" y="362" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">STRUCTURAL</text>
    <text x="58" y="380" font-size="11" fill="#666666">membership · location</text>
    <text x="58" y="392" font-size="11" fill="#666666">ownership · part-of</text>
  </g>

  <g>
    <rect x="252" y="330" width="200" height="64" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="270" y1="358" x2="304" y2="358" stroke="#1a1a1a" stroke-width="2.6"/>
    <text x="314" y="362" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">INTERACTS</text>
    <text x="270" y="380" font-size="11" fill="#666666">direct action between</text>
    <text x="270" y="392" font-size="11" fill="#666666">entities · event participation</text>
  </g>

  <g>
    <rect x="464" y="330" width="200" height="64" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="482" y1="358" x2="516" y2="358" stroke="#1a1a1a" stroke-width="1.6" stroke-dasharray="2,2"/>
    <text x="524" y="362" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">ASSERTS</text>
    <text x="482" y="380" font-size="11" fill="#666666">claims · beliefs · what an</text>
    <text x="482" y="392" font-size="11" fill="#666666">entity says about another</text>
  </g>

  <g>
    <rect x="676" y="330" width="200" height="64" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="694" y1="358" x2="728" y2="358" stroke="#1a1a1a" stroke-width="1.6" stroke-dasharray="5,3"/>
    <text x="736" y="362" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">INFLUENCES</text>
    <text x="694" y="380" font-size="11" fill="#666666">causal effect</text>
    <text x="694" y="392" font-size="11" fill="#666666">(four-tier evidence levels)</text>
  </g>

  <g>
    <rect x="888" y="330" width="172" height="64" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="906" y1="358" x2="940" y2="358" stroke="#b8954a" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="948" y="362" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">PREDICTS</text>
    <text x="906" y="380" font-size="11" fill="#666666">prophecy · foreshadowing</text>
    <text x="906" y="392" font-size="11" fill="#666666">forward-looking statement</text>
  </g>

  <!-- ════════ GLUCOSE strip ════════ -->
  <text x="40" y="436" font-size="13" font-weight="700" letter-spacing="2" fill="#8a6f37">10-DIMENSIONAL IMPLICIT FACTS · GLUCOSE</text>
  <text x="40" y="456" font-size="11" fill="#999999" font-style="italic">Mostafazadeh et al. EMNLP 2020 — Best Paper</text>

  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="1020" height="50" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="0" y="0" width="6" height="50" fill="#b8954a"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#1a1a1a">5 dimensions</text>
    <text x="20" y="38" font-size="11" font-family="ui-monospace, monospace" fill="#666666">cause · emotion · location · possession · attribute</text>
    <text x="540" y="22" font-size="12" font-weight="700" fill="#1a1a1a">2 time aspects</text>
    <text x="540" y="38" font-size="11" font-family="ui-monospace, monospace" fill="#666666">before  ·  after</text>
    <text x="780" y="22" font-size="12" font-weight="700" fill="#1a1a1a">inference depth</text>
    <text x="780" y="38" font-size="11" font-family="ui-monospace, monospace" fill="#666666">explicit · one_step · multi_step</text>
  </g>
</svg>
