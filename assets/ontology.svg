<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <rect width="1200" height="800" fill="#f3ede0"/>

  <!-- ════════ Title ════════ -->
  <text x="600" y="56" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">Figure 4 · What lives in the graph</text>
  <text x="600" y="80" text-anchor="middle" font-size="13" fill="#666666" font-style="italic">A bounded ontology: 4 entity types · 5 relation classes · 10 implicit-fact dimensions.</text>
  <line x1="80" y1="104" x2="1120" y2="104" stroke="#1a1a1a" stroke-width="0.6" opacity="0.3"/>

  <!-- ════════════════ SECTION 1 · Entity types ════════════════ -->
  <text x="80" y="148" font-size="11" font-weight="700" letter-spacing="2.5" fill="#8a6f37">1  ·  ENTITY TYPES</text>
  <line x1="80" y1="156" x2="1120" y2="156" stroke="#b8954a" stroke-width="1"/>

  <g transform="translate(80, 176)">
    <!-- Agent · circle -->
    <rect x="0" y="0" width="240" height="172" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle cx="40" cy="44" r="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="76" y="40" font-size="18" font-weight="700" fill="#1a1a1a">Agent</text>
    <text x="76" y="60" font-size="10" font-family="ui-monospace, monospace" fill="#8a6f37" letter-spacing="0.5">主体 · circle</text>
    <line x1="20" y1="88" x2="220" y2="88" stroke="#e6dbc7"/>
    <text x="20" y="112" font-size="12" fill="#1a1a1a">individuals · groups</text>
    <text x="20" y="128" font-size="12" fill="#1a1a1a">acting as a unit</text>
    <text x="20" y="156" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#999999">ex: a protagonist, the family</text>

    <!-- Object · square -->
    <rect x="264" y="0" width="240" height="172" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="284" y="24" width="40" height="40" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="340" y="40" font-size="18" font-weight="700" fill="#1a1a1a">Object</text>
    <text x="340" y="60" font-size="10" font-family="ui-monospace, monospace" fill="#8a6f37" letter-spacing="0.5">客体 · square</text>
    <line x1="284" y1="88" x2="484" y2="88" stroke="#e6dbc7"/>
    <text x="284" y="112" font-size="12" fill="#1a1a1a">physical things · places</text>
    <text x="284" y="128" font-size="12" fill="#1a1a1a">documents · artifacts</text>
    <text x="284" y="156" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#999999">ex: a letter, the manor, a diary</text>

    <!-- Event · diamond -->
    <rect x="528" y="0" width="240" height="172" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <g transform="rotate(45 568 44)"><rect x="548" y="24" width="40" height="40" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/></g>
    <text x="604" y="40" font-size="18" font-weight="700" fill="#1a1a1a">Event</text>
    <text x="604" y="60" font-size="10" font-family="ui-monospace, monospace" fill="#8a6f37" letter-spacing="0.5">事件 · diamond</text>
    <line x1="548" y1="88" x2="748" y2="88" stroke="#e6dbc7"/>
    <text x="548" y="112" font-size="12" fill="#1a1a1a"><tspan font-style="italic">realis</tspan> triggers — what</text>
    <text x="548" y="128" font-size="12" fill="#1a1a1a">actually happened</text>
    <text x="548" y="156" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#999999">excludes: hypothetical, generic</text>

    <!-- Concept · hexagon -->
    <rect x="792" y="0" width="240" height="172" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <polygon points="816,52 826,36 854,36 868,52 854,68 826,68" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="880" y="40" font-size="18" font-weight="700" fill="#1a1a1a">Concept</text>
    <text x="880" y="60" font-size="10" font-family="ui-monospace, monospace" fill="#8a6f37" letter-spacing="0.5">概念 · hexagon</text>
    <line x1="812" y1="88" x2="1012" y2="88" stroke="#e6dbc7"/>
    <text x="812" y="112" font-size="12" fill="#1a1a1a">themes · named relations</text>
    <text x="812" y="128" font-size="12" fill="#1a1a1a">predictions · motifs</text>
    <text x="812" y="156" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#999999">ex: the engagement, the curse</text>
  </g>

  <!-- ════════════════ SECTION 2 · Relation classes ════════════════ -->
  <text x="80" y="404" font-size="11" font-weight="700" letter-spacing="2.5" fill="#8a6f37">2  ·  RELATION CLASSES</text>
  <line x1="80" y1="412" x2="1120" y2="412" stroke="#b8954a" stroke-width="1"/>

  <g transform="translate(80, 432)">
    <!-- STRUCTURAL · thin solid -->
    <rect x="0" y="0" width="200" height="92" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="20" y1="32" x2="60" y2="32" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="20" y="60" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#1a1a1a">STRUCTURAL</text>
    <text x="20" y="78" font-size="11" fill="#666666">membership · location</text>

    <!-- INTERACTS · heavy solid -->
    <rect x="216" y="0" width="200" height="92" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="236" y1="32" x2="276" y2="32" stroke="#1a1a1a" stroke-width="2.4"/>
    <text x="236" y="60" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#1a1a1a">INTERACTS</text>
    <text x="236" y="78" font-size="11" fill="#666666">direct action · event participation</text>

    <!-- ASSERTS · short-dash -->
    <rect x="432" y="0" width="200" height="92" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="452" y1="32" x2="492" y2="32" stroke="#1a1a1a" stroke-width="1.4" stroke-dasharray="2,2"/>
    <text x="452" y="60" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#1a1a1a">ASSERTS</text>
    <text x="452" y="78" font-size="11" fill="#666666">claims · beliefs · what is said</text>

    <!-- INFLUENCES · long-dash -->
    <rect x="648" y="0" width="200" height="92" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="668" y1="32" x2="708" y2="32" stroke="#1a1a1a" stroke-width="1.4" stroke-dasharray="6,3"/>
    <text x="668" y="60" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#1a1a1a">INFLUENCES</text>
    <text x="668" y="78" font-size="11" fill="#666666">causal effect · 4-tier evidence</text>

    <!-- PREDICTS · gold dashed -->
    <rect x="864" y="0" width="176" height="92" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="884" y1="32" x2="924" y2="32" stroke="#b8954a" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="884" y="60" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#1a1a1a">PREDICTS</text>
    <text x="884" y="78" font-size="11" fill="#666666">prophecy · foreshadowing</text>
  </g>

  <!-- ════════════════ SECTION 3 · GLUCOSE matrix ════════════════ -->
  <text x="80" y="572" font-size="11" font-weight="700" letter-spacing="2.5" fill="#8a6f37">3  ·  IMPLICIT FACTS  ·  GLUCOSE</text>
  <line x1="80" y1="580" x2="1120" y2="580" stroke="#b8954a" stroke-width="1"/>
  <text x="80" y="604" font-size="13" fill="#666666">5 semantic dimensions × 2 temporal aspects =
    <tspan font-weight="700" fill="#1a1a1a">10 dimensions</tspan>,
    <tspan>tagged with inference depth.</tspan>
  </text>

  <!-- 5×2 matrix -->
  <g transform="translate(80, 632)">
    <!-- header row -->
    <text x="180" y="14" font-size="10" font-weight="700" letter-spacing="1.8" fill="#999999">DIMENSION</text>
    <text x="464" y="14" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.8" fill="#999999">BEFORE</text>
    <text x="616" y="14" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.8" fill="#999999">AFTER</text>
    <line x1="0" y1="24" x2="704" y2="24" stroke="#1a1a1a" stroke-width="1"/>

    <!-- row 1 · cause -->
    <text x="20" y="46" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#1a1a1a">cause</text>
    <rect x="400" y="32" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="464" y="46" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 1</text>
    <rect x="552" y="32" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="616" y="46" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 2</text>

    <!-- row 2 · emotion -->
    <text x="20" y="74" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#1a1a1a">emotion</text>
    <rect x="400" y="60" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="464" y="74" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 3</text>
    <rect x="552" y="60" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="616" y="74" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 4</text>

    <!-- row 3 · location -->
    <text x="20" y="102" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#1a1a1a">location</text>
    <rect x="400" y="88" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="464" y="102" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 5</text>
    <rect x="552" y="88" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="616" y="102" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 6</text>

    <!-- row 4 · possession -->
    <text x="20" y="130" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#1a1a1a">possession</text>
    <rect x="400" y="116" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="464" y="130" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 7</text>
    <rect x="552" y="116" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="616" y="130" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 8</text>

    <!-- row 5 · attribute -->
    <text x="20" y="158" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#1a1a1a">attribute</text>
    <rect x="400" y="144" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="464" y="158" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 9</text>
    <rect x="552" y="144" width="128" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="616" y="158" text-anchor="middle" font-size="11" fill="#1a1a1a">dim 10</text>
  </g>

  <!-- inference depth annotation · right of matrix -->
  <g transform="translate(840, 632)">
    <text x="0" y="14" font-size="10" font-weight="700" letter-spacing="1.8" fill="#999999">× INFERENCE DEPTH</text>
    <line x1="0" y1="24" x2="240" y2="24" stroke="#1a1a1a" stroke-width="1"/>
    <text x="0" y="50" font-family="ui-monospace, monospace" font-size="12" fill="#1a1a1a">explicit</text>
    <text x="0" y="66" font-size="11" fill="#666666">stated outright in the text</text>
    <text x="0" y="92" font-family="ui-monospace, monospace" font-size="12" fill="#1a1a1a">one_step</text>
    <text x="0" y="108" font-size="11" fill="#666666">one inference from text</text>
    <text x="0" y="134" font-family="ui-monospace, monospace" font-size="12" fill="#1a1a1a">multi_step</text>
    <text x="0" y="150" font-size="11" fill="#666666">multi-hop inference</text>
  </g>

  <!-- ════════ Caption ════════ -->
  <text x="600" y="784" text-anchor="middle" font-size="11" font-style="italic" fill="#999999">Mostafazadeh et al. EMNLP 2020 — Best Paper.</text>
</svg>
