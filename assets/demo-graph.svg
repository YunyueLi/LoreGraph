<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b8954a"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#f3ede0"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">What you get — a fragment of a real extraction</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#666666" font-style="italic">Typed entities · typed edges · GLUCOSE implicit facts · every claim cites a literal source span.</text>

  <!-- Legend (entity types via SHAPE, not color) -->
  <g transform="translate(900, 100)">
    <rect x="0" y="0" width="240" height="200" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="120" y="26" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="1.8" fill="#1a1a1a">ENTITY TYPES</text>
    <line x1="20" y1="38" x2="220" y2="38" stroke="#e6dbc7"/>

    <circle cx="32" cy="62" r="10" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="54" y="66" font-size="13" fill="#1a1a1a">Agent</text>
    <text x="120" y="66" font-size="11" fill="#999999" font-style="italic">characters, groups</text>

    <rect x="22" y="86" width="20" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="54" y="100" font-size="13" fill="#1a1a1a">Object</text>
    <text x="120" y="100" font-size="11" fill="#999999" font-style="italic">places, things, docs</text>

    <g transform="rotate(45 32 130)"><rect x="22" y="120" width="20" height="20" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.5"/></g>
    <text x="54" y="134" font-size="13" fill="#1a1a1a">Event</text>
    <text x="120" y="134" font-size="11" fill="#999999" font-style="italic">realis triggers</text>

    <polygon points="22,164 28,154 36,154 42,164 36,174 28,174" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="54" y="168" font-size="13" fill="#1a1a1a">Concept</text>
    <text x="120" y="168" font-size="11" fill="#999999" font-style="italic">themes, motifs</text>

    <text x="120" y="192" text-anchor="middle" font-size="10" fill="#999999" font-style="italic">node size ∝ √(mention count)</text>
  </g>

  <!-- ════════ Edges (drawn first, so node fills cover endpoints) ════════ -->

  <!-- Protagonist ↔ Confidant -->
  <line x1="290" y1="280" x2="540" y2="220" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
  <rect x="370" y="232" width="98" height="20" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="419" y="246" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="ui-monospace, monospace" letter-spacing="0.6">INTERACTS</text>

  <!-- Protagonist ↓ Mentor -->
  <line x1="290" y1="280" x2="290" y2="450" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
  <rect x="244" y="356" width="92" height="20" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="290" y="370" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="ui-monospace, monospace" letter-spacing="0.6">STRUCTURAL</text>

  <!-- Mentor → Heirloom -->
  <line x1="340" y1="490" x2="510" y2="510" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
  <rect x="382" y="490" width="92" height="20" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="428" y="504" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="ui-monospace, monospace" letter-spacing="0.6">INTERACTS</text>

  <!-- Heirloom → Curse (SYMBOLIZES — dashed) -->
  <line x1="570" y1="490" x2="720" y2="380" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85" stroke-dasharray="6,4"/>
  <rect x="612" y="425" width="92" height="20" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="658" y="439" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="ui-monospace, monospace" letter-spacing="0.6">SYMBOLIZES</text>

  <!-- Curse → Protagonist (PREDICTS — gold dashed) -->
  <line x1="700" y1="340" x2="320" y2="270" stroke="#b8954a" stroke-width="1.8" marker-end="url(#arrow-gold)" opacity="0.95" stroke-dasharray="6,3"/>
  <rect x="490" y="280" width="80" height="20" fill="#f3ede0" stroke="#b8954a" stroke-width="0.8"/>
  <text x="530" y="294" text-anchor="middle" font-size="10" fill="#8a6f37" font-family="ui-monospace, monospace" font-weight="700" letter-spacing="0.6">PREDICTS</text>

  <!-- Confidant → Revelation -->
  <line x1="600" y1="170" x2="750" y2="170" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
  <rect x="638" y="148" width="80" height="20" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="678" y="162" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="ui-monospace, monospace" letter-spacing="0.6">CAUSES</text>

  <!-- Revelation → Loyalty -->
  <line x1="810" y1="220" x2="800" y2="320" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
  <rect x="760" y="262" width="92" height="20" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="806" y="276" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="ui-monospace, monospace" letter-spacing="0.6">INFLUENCES</text>

  <!-- ════════ NODES (shape = type) ════════ -->

  <!-- The Protagonist (Agent · largest circle) -->
  <circle cx="220" cy="280" r="64" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="220" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">The</text>
  <text x="220" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Protagonist</text>
  <text x="220" y="316" text-anchor="middle" font-size="10" fill="#666666" font-family="ui-monospace, monospace">142 mentions</text>

  <!-- The Confidant (Agent · circle) -->
  <circle cx="580" cy="170" r="50" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="580" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">The Confidant</text>
  <text x="580" y="194" text-anchor="middle" font-size="10" fill="#666666" font-family="ui-monospace, monospace">38 mentions</text>

  <!-- The Mentor (Agent · circle) -->
  <circle cx="290" cy="490" r="48" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="290" y="488" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">The</text>
  <text x="290" y="504" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Mentor</text>
  <text x="290" y="525" text-anchor="middle" font-size="10" fill="#666666" font-family="ui-monospace, monospace">21 mentions</text>

  <!-- The Heirloom (Object · square) -->
  <rect x="510" y="480" width="60" height="60" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="540" y="508" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">The</text>
  <text x="540" y="522" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">Heirloom</text>

  <!-- The Revelation (Event · diamond / rotated square) -->
  <g transform="rotate(45 800 190)"><rect x="755" y="145" width="90" height="90" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/></g>
  <text x="800" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">The</text>
  <text x="800" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Revelation</text>
  <text x="800" y="220" text-anchor="middle" font-size="10" fill="#666666" font-family="ui-monospace, monospace">macro</text>

  <!-- The Curse (Concept · hexagon) -->
  <polygon points="690,370 720,332 760,332 790,370 760,408 720,408" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="740" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">The Curse</text>
  <text x="740" y="386" text-anchor="middle" font-size="10" fill="#666666" font-family="ui-monospace, monospace">prophecy</text>

  <!-- Loyalty (Concept · hexagon, smaller) -->
  <polygon points="790,380 814,352 850,352 874,380 850,408 814,408" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="832" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">Loyalty</text>
  <text x="832" y="394" text-anchor="middle" font-size="9" fill="#666666" font-family="ui-monospace, monospace">theme</text>

  <!-- ════════ Evidence callout ════════ -->
  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="1040" height="100" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="0" y="0" width="6" height="100" fill="#b8954a"/>
    <text x="24" y="34" font-size="11" font-weight="700" letter-spacing="1.8" fill="#8a6f37">EVERY EDGE HAS A SOURCE</text>
    <text x="24" y="60" font-size="13" fill="#1a1a1a">
      <tspan font-weight="700">The Heirloom → Loyalty</tspan>
      <tspan fill="#999999"> · STRUCTURAL · confidence 0.92 · explicit · </tspan>
      <tspan fill="#666666" font-family="ui-monospace, monospace">atom_id = ch07_p012</tspan>
    </text>
    <text x="24" y="84" font-size="13" fill="#1a1a1a" font-style="italic" font-family="Georgia, 'Times New Roman', serif">
      ❝ He pressed the locket into her hand and said, "Wear it. Remember whose blood you carry." ❞
    </text>
  </g>

  <!-- Footer -->
  <text x="600" y="708" text-anchor="middle" font-size="11" fill="#999999" font-style="italic">
    Illustrative — a real short-novel graph typically holds 40–200 nodes and 80–600 edges.
  </text>
</svg>
