<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- Warm cream background -->
  <rect width="1400" height="400" fill="#f3ede0"/>

  <!-- Italic tagline -->
  <text x="700" y="60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="22" fill="#1a1a1a">every node cites the page it came from.</text>

  <!-- Subtle constellation arc through all node centers -->
  <path d="M 180 130 Q 460 95 700 130 T 1220 130" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.35"/>

  <!-- ════════════════ 5 page+node units ════════════════ -->

  <!-- UNIT 1 · Agent (circle) -->
  <g transform="translate(180, 0)">
    <!-- connector node→highlight -->
    <line x1="0" y1="144" x2="-8" y2="248" stroke="#1a1a1a" stroke-width="0.9"/>
    <!-- node -->
    <circle cx="0" cy="130" r="14" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <!-- page -->
    <rect x="-58" y="160" width="116" height="200" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <line x1="-42" y1="184" x2="42" y2="184" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="200" x2="36" y2="200" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="216" x2="42" y2="216" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="232" x2="38" y2="232" stroke="#c8bba0" stroke-width="1.2"/>
    <rect x="-42" y="244" width="68" height="11" fill="#b8954a"/>
    <line x1="-42" y1="266" x2="40" y2="266" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="282" x2="42" y2="282" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="298" x2="32" y2="298" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="314" x2="42" y2="314" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="330" x2="36" y2="330" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="346" x2="42" y2="346" stroke="#c8bba0" stroke-width="1.2"/>
  </g>

  <!-- UNIT 2 · Object (square) -->
  <g transform="translate(460, 0)">
    <line x1="0" y1="144" x2="-6" y2="200" stroke="#1a1a1a" stroke-width="0.9"/>
    <rect x="-12" y="118" width="24" height="24" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <rect x="-58" y="160" width="116" height="200" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <line x1="-42" y1="184" x2="40" y2="184" stroke="#c8bba0" stroke-width="1.2"/>
    <rect x="-42" y="194" width="56" height="11" fill="#b8954a"/>
    <line x1="-42" y1="216" x2="38" y2="216" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="232" x2="42" y2="232" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="248" x2="40" y2="248" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="264" x2="42" y2="264" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="280" x2="36" y2="280" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="296" x2="42" y2="296" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="312" x2="42" y2="312" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="328" x2="34" y2="328" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="344" x2="42" y2="344" stroke="#c8bba0" stroke-width="1.2"/>
  </g>

  <!-- UNIT 3 · Event (diamond) -->
  <g transform="translate(700, 0)">
    <line x1="0" y1="148" x2="4" y2="296" stroke="#1a1a1a" stroke-width="0.9"/>
    <g transform="rotate(45 0 130)"><rect x="-12" y="118" width="24" height="24" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/></g>
    <rect x="-58" y="160" width="116" height="200" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <line x1="-42" y1="184" x2="42" y2="184" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="200" x2="36" y2="200" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="216" x2="42" y2="216" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="232" x2="40" y2="232" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="248" x2="42" y2="248" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="264" x2="38" y2="264" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="280" x2="42" y2="280" stroke="#c8bba0" stroke-width="1.2"/>
    <rect x="-42" y="292" width="72" height="11" fill="#b8954a"/>
    <line x1="-42" y1="314" x2="42" y2="314" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="330" x2="34" y2="330" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="346" x2="42" y2="346" stroke="#c8bba0" stroke-width="1.2"/>
  </g>

  <!-- UNIT 4 · Concept (hexagon) -->
  <g transform="translate(940, 0)">
    <line x1="0" y1="146" x2="-4" y2="244" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="-13,122 -6.5,110 6.5,110 13,122 6.5,134 -6.5,134" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <rect x="-58" y="160" width="116" height="200" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <line x1="-42" y1="184" x2="42" y2="184" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="200" x2="38" y2="200" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="216" x2="42" y2="216" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="232" x2="40" y2="232" stroke="#c8bba0" stroke-width="1.2"/>
    <rect x="-42" y="244" width="60" height="11" fill="#b8954a"/>
    <line x1="-42" y1="266" x2="42" y2="266" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="282" x2="36" y2="282" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="298" x2="42" y2="298" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="314" x2="38" y2="314" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="330" x2="42" y2="330" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="346" x2="34" y2="346" stroke="#c8bba0" stroke-width="1.2"/>
  </g>

  <!-- UNIT 5 · Agent (circle, larger) -->
  <g transform="translate(1220, 0)">
    <line x1="0" y1="146" x2="-2" y2="216" stroke="#1a1a1a" stroke-width="0.9"/>
    <circle cx="0" cy="130" r="16" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.6"/>
    <rect x="-58" y="160" width="116" height="200" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <line x1="-42" y1="184" x2="40" y2="184" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="200" x2="42" y2="200" stroke="#c8bba0" stroke-width="1.2"/>
    <rect x="-42" y="212" width="80" height="11" fill="#b8954a"/>
    <line x1="-42" y1="232" x2="38" y2="232" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="248" x2="42" y2="248" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="264" x2="42" y2="264" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="280" x2="36" y2="280" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="296" x2="42" y2="296" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="312" x2="32" y2="312" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="328" x2="42" y2="328" stroke="#c8bba0" stroke-width="1.2"/>
    <line x1="-42" y1="344" x2="38" y2="344" stroke="#c8bba0" stroke-width="1.2"/>
  </g>

</svg>
