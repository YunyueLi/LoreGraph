<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <radialGradient id="agent" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#bfdbfe"/>
    </radialGradient>
  </defs>

  <rect width="920" height="680" fill="url(#bg)"/>

  <!-- Browser chrome -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="840" height="600" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Window controls -->
    <circle cx="68" cy="68" r="6" fill="#fb7185"/>
    <circle cx="86" cy="68" r="6" fill="#fbbf24"/>
    <circle cx="104" cy="68" r="6" fill="#34d399"/>

    <!-- Address bar -->
    <rect x="140" y="56" width="700" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="160" y="72" font-size="11" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#475569">
      loregraph.pages.dev/?book_id=1
    </text>

    <!-- Page header -->
    <line x1="40" y1="92" x2="880" y2="92" stroke="#e2e8f0"/>
    <text x="60" y="120" font-size="18" font-weight="700" fill="#0f172a">LoreGraph</text>
    <text x="178" y="121" font-size="10" font-family="ui-monospace, monospace" fill="#94a3b8">knowledge graphs from closed-world fiction</text>

    <!-- Book selector -->
    <text x="480" y="121" font-size="12" fill="#64748b">Book:</text>
    <rect x="518" y="106" width="220" height="22" rx="4" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="532" y="121" font-size="12" fill="#0f172a">The Yellow Wallpaper · Gilman</text>

    <!-- Layout split -->
    <line x1="540" y1="140" x2="540" y2="640" stroke="#e2e8f0"/>

    <!-- LEFT: graph preview -->
    <g transform="translate(60, 160)">
      <circle cx="120" cy="130" r="44" fill="url(#agent)" stroke="#3a6fa5" stroke-width="1.5"/>
      <text x="120" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">The</text>
      <text x="120" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Protagonist</text>

      <line x1="156" y1="125" x2="270" y2="100" stroke="#475569" stroke-width="1.2" opacity="0.6"/>
      <line x1="156" y1="145" x2="300" y2="220" stroke="#475569" stroke-width="1.2" opacity="0.6"/>
      <line x1="120" y1="170" x2="120" y2="280" stroke="#475569" stroke-width="1.2" opacity="0.6"/>

      <circle cx="300" cy="85" r="26" fill="#e4f3f3" stroke="#0e7a7a" stroke-width="1"/>
      <text x="300" y="89" text-anchor="middle" font-size="10" fill="#0f172a">Room</text>

      <circle cx="320" cy="230" r="22" fill="#efe7f8" stroke="#6d4e94" stroke-width="1"/>
      <text x="320" y="233" text-anchor="middle" font-size="9" fill="#0f172a">Confinement</text>

      <circle cx="120" cy="310" r="30" fill="#e4f3f3" stroke="#0e7a7a" stroke-width="1"/>
      <text x="120" y="307" text-anchor="middle" font-size="10" fill="#0f172a">Yellow</text>
      <text x="120" y="320" text-anchor="middle" font-size="10" fill="#0f172a">Wallpaper</text>

      <text x="220" y="430" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">— graph view —</text>
    </g>

    <!-- RIGHT: evidence panel -->
    <g transform="translate(560, 160)">
      <!-- Header -->
      <text x="0" y="0" font-size="14" font-weight="700" fill="#0f172a">Selected: The Protagonist</text>
      <rect x="218" y="-14" width="50" height="18" rx="4" fill="#dbeafe"/>
      <text x="243" y="-1" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Agent</text>

      <text x="0" y="20" font-size="11" font-family="ui-monospace, monospace" fill="#94a3b8">ent_protagonist · 142 mentions across 28 chunks</text>

      <!-- Aliases -->
      <text x="0" y="56" font-size="10" font-weight="700" letter-spacing="1.2" fill="#94a3b8">ALIASES</text>
      <text x="0" y="76" font-size="13" fill="#0f172a">"she", "the narrator", "I"</text>

      <!-- Outgoing edges -->
      <text x="0" y="116" font-size="10" font-weight="700" letter-spacing="1.2" fill="#94a3b8">OUTGOING EDGES</text>

      <rect x="-4" y="125" width="50" height="18" rx="4" fill="#f1f5f9"/>
      <text x="21" y="139" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#475569">LIVES_IN</text>
      <text x="54" y="139" font-size="12" fill="#475569">→</text>
      <text x="70" y="139" font-size="13" fill="#0f172a">Room</text>

      <text x="0" y="160" font-size="11" fill="#475569" font-style="italic">
        ❝ It is a big, airy room, the whole floor nearly ❞
      </text>

      <rect x="-4" y="178" width="60" height="18" rx="4" fill="#f1f5f9"/>
      <text x="26" y="192" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#475569">ASSERTS</text>
      <text x="64" y="192" font-size="12" fill="#475569">→</text>
      <text x="80" y="192" font-size="13" fill="#0f172a">Confinement</text>

      <text x="0" y="213" font-size="11" fill="#475569" font-style="italic">
        ❝ I cry at nothing, and cry most of the time ❞
      </text>

      <!-- GLUCOSE facts -->
      <text x="0" y="252" font-size="10" font-weight="700" letter-spacing="1.2" fill="#94a3b8">IMPLICIT (GLUCOSE) FACTS</text>

      <text x="0" y="276" font-size="10" font-family="ui-monospace, monospace" fill="#94a3b8">emotion · after · one_step</text>
      <text x="0" y="296" font-size="13" fill="#0f172a">"she feels surveilled by the pattern"</text>
      <text x="0" y="314" font-size="11" fill="#475569" font-style="italic">
        ❝ I think there are women behind that paper ❞
      </text>

      <text x="0" y="350" font-size="10" font-family="ui-monospace, monospace" fill="#94a3b8">attribute · explicit</text>
      <text x="0" y="370" font-size="13" fill="#0f172a">"physically and mentally exhausted"</text>
      <text x="0" y="388" font-size="11" fill="#475569" font-style="italic">
        ❝ I get so tired of trying to lift and push it ❞
      </text>

      <!-- Verification chip -->
      <rect x="0" y="420" width="220" height="32" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="110" y="441" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">
        ✓ all claims · evidence_span verified (Pass-7)
      </text>
    </g>
  </g>

  <!-- Caption -->
  <text x="460" y="668" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">
    Right panel updates live as the visitor clicks any node or edge in the graph.
  </text>
</svg>
