<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <rect width="920" height="680" fill="#f3ede0"/>

  <!-- Browser chrome -->
  <rect x="40" y="40" width="840" height="600" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- Window controls -->
  <circle cx="68" cy="68" r="6" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="86" cy="68" r="6" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="104" cy="68" r="6" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Address bar -->
  <rect x="140" y="56" width="700" height="24" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="160" y="72" font-size="11" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#666666">
    loregraph.pages.dev/?book_id=1
  </text>

  <!-- Page header -->
  <line x1="40" y1="92" x2="880" y2="92" stroke="#e6dbc7"/>
  <text x="60" y="120" font-size="18" font-weight="700" fill="#1a1a1a">LoreGraph</text>
  <text x="178" y="121" font-size="10" font-family="ui-monospace, monospace" fill="#999999" font-style="italic">knowledge graphs from closed-world fiction</text>

  <!-- Book selector -->
  <text x="480" y="121" font-size="12" fill="#666666">Book:</text>
  <rect x="518" y="106" width="220" height="22" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="532" y="121" font-size="12" fill="#1a1a1a">The Yellow Wallpaper · Gilman</text>

  <!-- Layout split -->
  <line x1="540" y1="140" x2="540" y2="640" stroke="#e6dbc7"/>

  <!-- LEFT: graph preview -->
  <g transform="translate(60, 160)">
    <!-- edges first -->
    <line x1="156" y1="125" x2="270" y2="100" stroke="#1a1a1a" stroke-width="1.1" opacity="0.7"/>
    <line x1="156" y1="145" x2="300" y2="220" stroke="#1a1a1a" stroke-width="1.1" opacity="0.7"/>
    <line x1="120" y1="170" x2="120" y2="280" stroke="#1a1a1a" stroke-width="1.1" opacity="0.7"/>

    <!-- The Protagonist (Agent · circle, highlighted as selected) -->
    <circle cx="120" cy="130" r="44" fill="#b8954a" stroke="#1a1a1a" stroke-width="1.8"/>
    <text x="120" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">The</text>
    <text x="120" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">Protagonist</text>

    <!-- Room (Object · square) -->
    <rect x="276" y="61" width="48" height="48" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="300" y="89" text-anchor="middle" font-size="10" fill="#1a1a1a">Room</text>

    <!-- Confinement (Concept · hexagon) -->
    <polygon points="296,210 308,194 332,194 344,210 332,226 308,226" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="320" y="213" text-anchor="middle" font-size="9" fill="#1a1a1a">Confinement</text>

    <!-- Yellow Wallpaper (Object · square) -->
    <rect x="90" y="282" width="60" height="56" fill="#fdfbf6" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="120" y="305" text-anchor="middle" font-size="10" fill="#1a1a1a">Yellow</text>
    <text x="120" y="320" text-anchor="middle" font-size="10" fill="#1a1a1a">Wallpaper</text>

    <text x="220" y="430" text-anchor="middle" font-size="10" fill="#999999" font-style="italic">— graph view —</text>
  </g>

  <!-- RIGHT: evidence panel -->
  <g transform="translate(560, 160)">
    <!-- Header -->
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a1a1a">Selected: The Protagonist</text>
    <rect x="218" y="-14" width="50" height="18" fill="#b8954a"/>
    <text x="243" y="-1" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">Agent</text>

    <text x="0" y="20" font-size="11" font-family="ui-monospace, monospace" fill="#999999">ent_protagonist · 142 mentions across 28 chunks</text>

    <!-- Aliases -->
    <text x="0" y="56" font-size="10" font-weight="700" letter-spacing="1.8" fill="#8a6f37">ALIASES</text>
    <text x="0" y="76" font-size="13" fill="#1a1a1a">"she", "the narrator", "I"</text>

    <!-- Outgoing edges -->
    <text x="0" y="116" font-size="10" font-weight="700" letter-spacing="1.8" fill="#8a6f37">OUTGOING EDGES</text>

    <rect x="-4" y="125" width="60" height="18" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="26" y="139" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1a1a">LIVES_IN</text>
    <text x="64" y="139" font-size="12" fill="#666666">→</text>
    <text x="80" y="139" font-size="13" fill="#1a1a1a">Room</text>

    <text x="0" y="160" font-size="11" fill="#666666" font-style="italic" font-family="Georgia, serif">
      ❝ It is a big, airy room, the whole floor nearly ❞
    </text>

    <rect x="-4" y="178" width="60" height="18" fill="#f3ede0" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="26" y="192" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1a1a">ASSERTS</text>
    <text x="64" y="192" font-size="12" fill="#666666">→</text>
    <text x="80" y="192" font-size="13" fill="#1a1a1a">Confinement</text>

    <text x="0" y="213" font-size="11" fill="#666666" font-style="italic" font-family="Georgia, serif">
      ❝ I cry at nothing, and cry most of the time ❞
    </text>

    <!-- GLUCOSE facts -->
    <text x="0" y="252" font-size="10" font-weight="700" letter-spacing="1.8" fill="#8a6f37">IMPLICIT (GLUCOSE) FACTS</text>

    <text x="0" y="276" font-size="10" font-family="ui-monospace, monospace" fill="#999999">emotion · after · one_step</text>
    <text x="0" y="296" font-size="13" fill="#1a1a1a">"she feels surveilled by the pattern"</text>
    <text x="0" y="316" font-size="11" fill="#666666" font-style="italic" font-family="Georgia, serif">
      ❝ I think there are women behind that paper ❞
    </text>

    <text x="0" y="352" font-size="10" font-family="ui-monospace, monospace" fill="#999999">attribute · explicit</text>
    <text x="0" y="372" font-size="13" fill="#1a1a1a">"physically and mentally exhausted"</text>
    <text x="0" y="392" font-size="11" fill="#666666" font-style="italic" font-family="Georgia, serif">
      ❝ I get so tired of trying to lift and push it ❞
    </text>

    <!-- Verification chip (gold) -->
    <rect x="0" y="422" width="240" height="34" fill="#b8954a" stroke="#1a1a1a" stroke-width="1"/>
    <text x="120" y="444" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">
      ✓  all claims · evidence_span verified  (Pass-7)
    </text>
  </g>

  <!-- Caption -->
  <text x="460" y="668" text-anchor="middle" font-size="11" fill="#666666" font-style="italic">
    Right panel updates live as the visitor clicks any node or edge in the graph.
  </text>
</svg>
