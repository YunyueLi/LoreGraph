<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <rect width="1200" height="720" fill="#ffffff"/>

  <!-- ════════ Title block ════════ -->
  <text x="600" y="56" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">Figure 2 · The detail panel</text>
  <text x="600" y="80" text-anchor="middle" font-size="13" fill="#666666" font-style="italic">Right-side evidence panel updates live when the visitor clicks any node or edge.</text>
  <line x1="80" y1="104" x2="1120" y2="104" stroke="#1a1a1a" stroke-width="0.6" opacity="0.3"/>

  <!-- ════════ Top bar ════════ -->
  <g transform="translate(80, 128)">
    <rect x="0" y="0" width="1040" height="48" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#1a1a1a">LoreGraph</text>
    <text x="120" y="30" font-size="11" font-style="italic" fill="#999999">/ The Yellow Wallpaper · C. P. Gilman</text>

    <!-- verified chip -->
    <rect x="864" y="12" width="160" height="24" fill="#b8954a"/>
    <text x="944" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">✓  Pass-7 verified</text>
  </g>

  <!-- ════════ Two-column layout ════════ -->
  <!-- divider -->
  <line x1="480" y1="200" x2="480" y2="664" stroke="#1a1a1a" stroke-width="0.6" opacity="0.3"/>

  <!-- ════════ LEFT · graph minimap ════════ -->
  <g transform="translate(80, 216)">
    <text x="0" y="0" font-size="10" font-weight="700" letter-spacing="2" fill="#8a6f37">GRAPH VIEW</text>
    <line x1="0" y1="10" x2="360" y2="10" stroke="#b8954a" stroke-width="1"/>

    <!-- edges -->
    <line x1="120" y1="120" x2="240" y2="80" stroke="#1a1a1a" stroke-width="1.2" opacity="0.7"/>
    <line x1="120" y1="160" x2="280" y2="220" stroke="#1a1a1a" stroke-width="1.2" opacity="0.7"/>
    <line x1="120" y1="180" x2="120" y2="280" stroke="#1a1a1a" stroke-width="1.2" opacity="0.7"/>

    <!-- The Protagonist (highlighted as selected — gold border) -->
    <circle cx="120" cy="140" r="40" fill="#fafafa" stroke="#b8954a" stroke-width="3"/>
    <text x="120" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">The</text>
    <text x="120" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">Protagonist</text>

    <!-- Room (Object · square) -->
    <rect x="220" y="58" width="40" height="40" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="240" y="82" text-anchor="middle" font-size="10" fill="#1a1a1a">Room</text>

    <!-- Confinement (Concept · hexagon) -->
    <polygon points="248,238 260,222 296,222 308,238 296,254 260,254" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="278" y="242" text-anchor="middle" font-size="10" fill="#1a1a1a">Confinement</text>

    <!-- Wallpaper (Object · square) -->
    <rect x="92" y="288" width="56" height="44" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="120" y="307" text-anchor="middle" font-size="10" fill="#1a1a1a">Yellow</text>
    <text x="120" y="320" text-anchor="middle" font-size="10" fill="#1a1a1a">Wallpaper</text>

    <text x="180" y="396" text-anchor="middle" font-size="11" font-style="italic" fill="#999999">— click any node —</text>
  </g>

  <!-- ════════ RIGHT · detail panel ════════ -->
  <g transform="translate(520, 216)">
    <text x="0" y="0" font-size="10" font-weight="700" letter-spacing="2" fill="#8a6f37">DETAIL PANEL</text>
    <line x1="0" y1="10" x2="600" y2="10" stroke="#b8954a" stroke-width="1"/>

    <!-- Entity name + type -->
    <text x="0" y="44" font-size="18" font-weight="700" fill="#1a1a1a">The Protagonist</text>
    <rect x="208" y="26" width="48" height="20" fill="#1a1a1a"/>
    <text x="232" y="40" text-anchor="middle" font-size="10" font-weight="700" fill="#fafafa" letter-spacing="1">AGENT</text>
    <text x="0" y="64" font-size="11" font-family="ui-monospace, monospace" fill="#999999">ent_protagonist  ·  142 mentions  ·  28 chunks</text>

    <!-- ALIASES -->
    <text x="0" y="108" font-size="10" font-weight="700" letter-spacing="2" fill="#8a6f37">ALIASES</text>
    <text x="0" y="128" font-size="13" fill="#1a1a1a">"she"  ·  "the narrator"  ·  "I"</text>

    <!-- OUTGOING EDGES -->
    <text x="0" y="172" font-size="10" font-weight="700" letter-spacing="2" fill="#8a6f37">OUTGOING EDGES · 2</text>
    <line x1="0" y1="180" x2="600" y2="180" stroke="#e8e8e8"/>

    <text x="0" y="202" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#1a1a1a">LIVES_IN</text>
    <text x="76" y="202" font-size="11" fill="#666666">→</text>
    <text x="96" y="202" font-size="13" fill="#1a1a1a">Room</text>
    <text x="0" y="220" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#666666">"It is a big, airy room, the whole floor nearly"</text>

    <text x="0" y="252" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#1a1a1a">ASSERTS</text>
    <text x="76" y="252" font-size="11" fill="#666666">→</text>
    <text x="96" y="252" font-size="13" fill="#1a1a1a">Confinement</text>
    <text x="0" y="270" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#666666">"I cry at nothing, and cry most of the time"</text>

    <!-- IMPLICIT FACTS -->
    <text x="0" y="316" font-size="10" font-weight="700" letter-spacing="2" fill="#8a6f37">IMPLICIT FACTS · GLUCOSE</text>
    <line x1="0" y1="324" x2="600" y2="324" stroke="#e8e8e8"/>

    <text x="0" y="346" font-family="ui-monospace, monospace" font-size="10" fill="#999999">emotion · after · one_step</text>
    <text x="0" y="366" font-size="13" fill="#1a1a1a">"she feels surveilled by the pattern"</text>
    <text x="0" y="384" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#666666">"I think there are women behind that paper"</text>

    <text x="0" y="416" font-family="ui-monospace, monospace" font-size="10" fill="#999999">attribute · explicit</text>
    <text x="0" y="436" font-size="13" fill="#1a1a1a">"physically and mentally exhausted"</text>
    <text x="0" y="454" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#666666">"I get so tired of trying to lift and push it"</text>
  </g>

  <!-- ════════ Caption ════════ -->
  <text x="600" y="700" text-anchor="middle" font-size="11" font-style="italic" fill="#999999">Every quoted fragment is a literal substring of the source chunk — verified at extraction time by Pass-7.</text>
</svg>
